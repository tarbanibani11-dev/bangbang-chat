<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bangbang — Simple Realtime Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <script src="/socket.io/socket.io.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="modal-overlay" class="modal-overlay">
    <div class="modal-card">
      <div class="modal-logo"><span class="logo-bb">BB</span></div>
      <h1 class="modal-title">Selamat Datang di Bangbang</h1>
      <p class="modal-sub">Chat room publik — gratis, real-time, tanpa akun.</p>
      <div class="modal-input-wrap">
        <input id="username-input" type="text" placeholder="Username kamu..." maxlength="30" autocomplete="off" autofocus />
      </div>
      <button id="join-btn" class="btn-primary" disabled>Masuk ke Room →</button>
    </div>
  </div>

  <div id="app" class="app hidden">
    <header class="header">
      <div class="header-inner">
        <div class="header-brand">
          <span class="brand-badge">BB</span>
          <span class="brand-name">Bangbang</span>
          <span class="brand-dot" id="connection-dot"></span>
        </div>
        <div class="header-meta">
          <span id="online-count-badge" class="online-pill">
            <span class="pulse-ring"></span>
            <span id="header-count">0</span> online
          </span>
        </div>
      </div>
    </header>

    <main class="main-layout">
      <section class="chat-column">
        <div id="messages" class="messages-area"></div>
        <div class="input-bar">
          <input id="msg-input" type="text" placeholder="Ketik pesan..." maxlength="1000" autocomplete="off" />
          <button id="send-btn" class="btn-send">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </section>

      <aside class="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">Online</span>
          <span id="sidebar-count" class="sidebar-count">0</span>
        </div>
        <ul id="user-list" class="user-list"></ul>
      </aside>
    </main>
  </div>

  <script src="script.js"></script>
</body>
  </html>
